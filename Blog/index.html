<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111111;
    --surface: #191919;
    --surface2: #202020;
    --surface3: #272727;
    --border: #2a2a2a;
    --border2: #333333;
    --accent: #e8e8e8;
    --accent2: #ffffff;
    --muted: #666666;
    --muted2: #444444;
    --text: #d4d4d4;
    --text2: #888888;
    --text3: #555555;
    --danger: #c0392b;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    overflow-x: hidden;
  }

  /* ── LAYOUT ── */
  .layout { display: flex; height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1.2rem 0;
  }

  .sidebar-logo {
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: -0.02em;
    padding: 0 1.1rem 1.2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1rem;
  }

  .sidebar-section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0 1.1rem;
    margin-bottom: 0.4rem;
  }

  .folder-list { flex: 1; overflow-y: auto; padding: 0 0.5rem; }

  .folder-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 0.7rem;
    border-radius: 5px;
    cursor: pointer;
    color: var(--text2);
    font-size: 0.82rem;
    transition: all 0.15s;
    user-select: none;
  }
  .folder-item:hover { background: var(--surface2); color: var(--text); }
  .folder-item.active { background: var(--surface3); color: var(--accent2); }

  .folder-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted2);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .folder-item.active .folder-dot { background: var(--accent); }

  .folder-count {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text3);
  }

  .sidebar-bottom {
    padding: 0.8rem 0.5rem 0;
    border-top: 1px solid var(--border);
    margin-top: 0.5rem;
  }

  .new-folder-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    padding: 0.45rem 0.7rem;
    background: none;
    border: none;
    color: var(--text3);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.15s;
    text-align: left;
  }
  .new-folder-btn:hover { background: var(--surface2); color: var(--text2); }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.8rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .topbar-title {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--accent2);
  }

  .topbar-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text3);
    margin-top: 1px;
  }

  /* ── PAGES ── */
  .page { display: none; flex: 1; overflow-y: auto; }
  .page.active { display: flex; flex-direction: column; animation: fadeIn 0.2s ease; }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(6px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* ── HOME ── */
  #page-home.active { display: block; }

  .home-actions {
    padding: 1.2rem 1.8rem 0;
    display: flex;
    justify-content: flex-end;
  }

  .btn-new {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    background: var(--accent2);
    color: #111;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 5px;
    letter-spacing: -0.01em;
    transition: all 0.15s;
  }
  .btn-new:hover { background: var(--accent); transform: translateY(-1px); }

  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.8rem;
    padding: 1.2rem 1.8rem 2rem;
  }

  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .note-card:hover {
    border-color: var(--border2);
    background: var(--surface2);
    transform: translateY(-1px);
  }

  .note-card-title {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--accent2);
    margin-bottom: 0.4rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .note-card-preview {
    font-size: 0.78rem;
    color: var(--text2);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .note-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.8rem;
  }

  .note-card-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--text3);
  }

  .note-card-actions {
    display: flex;
    gap: 0.3rem;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .note-card:hover .note-card-actions { opacity: 1; }

  .icon-btn {
    background: var(--surface3);
    border: 1px solid var(--border2);
    color: var(--text2);
    width: 22px; height: 22px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.65rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .icon-btn:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
  .icon-btn.edit:hover { background: var(--border2); color: var(--accent2); }

  .empty-state {
    padding: 5rem 2rem;
    text-align: center;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 2rem; margin-bottom: 0.8rem; opacity: 0.3; }
  .empty-state p { font-size: 0.85rem; line-height: 1.6; }

  /* ── EDITOR ── */
  #page-editor {
    padding: 1.5rem 2rem 2rem;
    gap: 0;
  }

  .editor-nav {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 0.38rem 0.8rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--muted); color: var(--text); }

  .editor-title-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--accent2);
    font-family: 'Inter', sans-serif;
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    outline: none;
  }
  .editor-title-input::placeholder { color: var(--text3); }

  .editor-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text3);
    letter-spacing: 0.1em;
  }

  .folder-select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    padding: 0.28rem 0.6rem;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  .folder-select option { background: #191919; }

  .editor-toolbar {
    display: flex;
    gap: 0.2rem;
    margin-bottom: 0.7rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .toolbar-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 0.28rem 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .toolbar-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

  .toolbar-sep { width: 1px; height: 18px; background: var(--border2); margin: 0 0.1rem; }

  .editor-body {
    flex: 1;
    width: 100%;
    min-height: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    line-height: 1.75;
    padding: 1.2rem;
    outline: none;
    resize: vertical;
    transition: border-color 0.15s;
  }
  .editor-body:focus { border-color: var(--border2); }
  .editor-body::placeholder { color: var(--text3); }

  .editor-footer {
    display: flex;
    justify-content: flex-end;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .btn-save {
    padding: 0.5rem 1.2rem;
    background: var(--accent2);
    color: #111;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.15s;
  }
  .btn-save:hover { background: var(--accent); }

  .btn-export {
    padding: 0.5rem 1rem;
    background: none;
    color: var(--text2);
    border: 1px solid var(--border2);
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.15s;
  }
  .btn-export:hover { color: var(--text); border-color: var(--muted); }

  /* ── VIEW ── */
  #page-view {
    padding: 1.5rem 2rem 2rem;
    gap: 0;
  }

  .view-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .view-nav-left { display: flex; align-items: center; gap: 0.6rem; }

  .view-title {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: -0.025em;
    margin-bottom: 0.4rem;
  }

  .view-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text3);
    margin-bottom: 1.5rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
  }

  .view-body {
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text2);
    white-space: pre-wrap;
  }

  .html-preview-wrap {
    margin-top: 1.5rem;
    border: 1px solid var(--border2);
    border-radius: 7px;
    overflow: hidden;
  }

  .html-preview-bar {
    background: var(--surface2);
    padding: 0.45rem 0.9rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--text3);
    letter-spacing: 0.12em;
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .html-preview-bar::before {
    content:'';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #3a3;
  }

  .html-preview-frame {
    width: 100%;
    min-height: 280px;
    border: none;
    background: #fff;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 9px;
    padding: 1.5rem;
    width: 320px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity:0; transform:scale(0.96) translateY(-8px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }

  .modal h3 {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 1rem;
  }

  .modal input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    padding: 0.55rem 0.8rem;
    border-radius: 5px;
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.15s;
  }
  .modal input:focus { border-color: var(--muted); }

  .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 0.42rem 0.9rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.15s;
  }
  .btn-cancel:hover { color: var(--text); }

  .btn-confirm {
    background: var(--accent2);
    border: none;
    color: #111;
    padding: 0.42rem 0.9rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.15s;
  }
  .btn-confirm:hover { background: var(--accent); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">Notas</div>
    <div class="sidebar-section-label">Pastas</div>
    <div class="folder-list" id="folderList"></div>
    <div class="sidebar-bottom">
      <button class="new-folder-btn" onclick="openNewFolderModal()">
        <span>+</span> Nova pasta
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Todas as notas</div>
        <div class="topbar-meta" id="topbarMeta">0 notas</div>
      </div>
    </div>

    <!-- HOME -->
    <div class="page active" id="page-home">
      <div class="home-actions">
        <button class="btn-new" onclick="openEditor(null)">+ Nova nota</button>
      </div>
      <div class="notes-grid" id="notesGrid"></div>
    </div>

    <!-- EDITOR -->
    <div class="page" id="page-editor">
      <div class="editor-nav">
        <button class="back-btn" onclick="goHome()">← Voltar</button>
        <input class="editor-title-input" id="editorTitle" type="text" placeholder="Título…">
      </div>
      <div class="editor-meta">
        <span class="meta-label">PASTA</span>
        <select class="folder-select" id="editorFolder"></select>
      </div>
      <div class="editor-toolbar">
        <button class="toolbar-btn" onclick="wrapText('**','**')">B</button>
        <button class="toolbar-btn" onclick="wrapText('_','_')"><i>I</i></button>
        <button class="toolbar-btn" onclick="wrapText('# ','')">H1</button>
        <button class="toolbar-btn" onclick="wrapText('## ','')">H2</button>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn" onclick="wrapText('- ','')">Lista</button>
        <button class="toolbar-btn" onclick="wrapText('> ','')">Citação</button>
        <button class="toolbar-btn" onclick="wrapText('`','`')">Código</button>
      </div>
      <textarea class="editor-body" id="editorBody" placeholder="Escreva aqui… HTML também é suportado."></textarea>
      <div class="editor-footer">
        <button class="btn-export" onclick="exportHTML()">↓ Exportar HTML</button>
        <button class="btn-save" onclick="saveNote()">Salvar</button>
      </div>
    </div>

    <!-- VIEW -->
    <div class="page" id="page-view">
      <div class="view-nav">
        <div class="view-nav-left">
          <button class="back-btn" onclick="goHome()">← Voltar</button>
          <button class="toolbar-btn" onclick="editCurrentNote()">Editar</button>
        </div>
        <button class="btn-export" onclick="exportHTMLFromView()">↓ Exportar HTML</button>
      </div>
      <div class="view-title" id="viewTitle"></div>
      <div class="view-meta" id="viewMeta"></div>
      <div class="view-body" id="viewBody"></div>
      <div id="htmlPreviewArea"></div>
    </div>

  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Nova pasta</h3>
    <input type="text" id="newFolderInput" placeholder="Nome da pasta…" onkeydown="if(event.key==='Enter')confirmNewFolder()">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmNewFolder()">Criar</button>
    </div>
  </div>
</div>

<script>
  let notes = JSON.parse(localStorage.getItem('notas_notes') || '[]');
  let folders = JSON.parse(localStorage.getItem('notas_folders') || '["Pessoal","Trabalho","Ideias"]');
  let currentFolder = null;
  let editingNoteId = null;
  let viewingNoteId = null;

  function save() {
    localStorage.setItem('notas_notes', JSON.stringify(notes));
    localStorage.setItem('notas_folders', JSON.stringify(folders));
  }

  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function formatDate(ts) {
    return new Date(ts).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
  }

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
  }

  function goHome() {
    editingNoteId = null;
    viewingNoteId = null;
    renderAll();
    showPage('home');
  }

  function renderAll() {
    renderSidebar();
    renderNotes();
  }

  function renderSidebar() {
    const list = document.getElementById('folderList');
    list.innerHTML = '';

    const allItem = document.createElement('div');
    allItem.className = 'folder-item' + (currentFolder === null ? ' active' : '');
    allItem.innerHTML = `<span class="folder-dot"></span> Todas <span class="folder-count">${notes.length}</span>`;
    allItem.onclick = () => { currentFolder = null; renderAll(); };
    list.appendChild(allItem);

    folders.forEach(f => {
      const count = notes.filter(n => n.folder === f).length;
      const item = document.createElement('div');
      item.className = 'folder-item' + (currentFolder === f ? ' active' : '');
      item.innerHTML = `<span class="folder-dot"></span> ${f} <span class="folder-count">${count}</span>`;
      item.onclick = () => { currentFolder = f; renderAll(); };
      list.appendChild(item);
    });
  }

  function renderNotes() {
    const grid = document.getElementById('notesGrid');
    const filtered = currentFolder ? notes.filter(n => n.folder === currentFolder) : notes;

    document.getElementById('topbarTitle').textContent = currentFolder || 'Todas as notas';
    document.getElementById('topbarMeta').textContent = filtered.length + ' nota' + (filtered.length !== 1 ? 's' : '');

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">○</div><p>Nenhuma nota aqui ainda.</p></div>`;
      return;
    }

    grid.innerHTML = '';
    [...filtered].reverse().forEach(note => {
      const card = document.createElement('div');
      card.className = 'note-card';
      const preview = note.body.replace(/<[^>]*>/g, '').slice(0, 100);
      card.innerHTML = `
        <div class="note-card-title">${note.title || 'Sem título'}</div>
        <div class="note-card-preview">${preview || '<em style="color:var(--text3)">Vazia</em>'}</div>
        <div class="note-card-footer">
          <div class="note-card-date">${formatDate(note.updatedAt)}</div>
          <div class="note-card-actions">
            <button class="icon-btn edit" title="Editar" onclick="event.stopPropagation();openEditor('${note.id}')">✎</button>
            <button class="icon-btn" title="Excluir" onclick="event.stopPropagation();deleteNote('${note.id}')">✕</button>
          </div>
        </div>`;
      card.onclick = () => viewNote(note.id);
      grid.appendChild(card);
    });
  }

  function openEditor(id) {
    editingNoteId = id;
    const sel = document.getElementById('editorFolder');
    sel.innerHTML = folders.map(f => `<option value="${f}">${f}</option>`).join('');

    if (id) {
      const note = notes.find(n => n.id === id);
      document.getElementById('editorTitle').value = note.title;
      document.getElementById('editorBody').value = note.body;
      sel.value = note.folder;
    } else {
      document.getElementById('editorTitle').value = '';
      document.getElementById('editorBody').value = '';
      sel.value = currentFolder || folders[0];
    }
    showPage('editor');
  }

  function saveNote() {
    const title = document.getElementById('editorTitle').value.trim() || 'Sem título';
    const body = document.getElementById('editorBody').value;
    const folder = document.getElementById('editorFolder').value;

    if (editingNoteId) {
      const note = notes.find(n => n.id === editingNoteId);
      Object.assign(note, { title, body, folder, updatedAt: Date.now() });
    } else {
      notes.push({ id: genId(), title, body, folder, createdAt: Date.now(), updatedAt: Date.now() });
    }
    save();
    goHome();
  }

  function wrapText(before, after) {
    const ta = document.getElementById('editorBody');
    const s = ta.selectionStart, e = ta.selectionEnd;
    const sel = ta.value.slice(s, e);
    ta.value = ta.value.slice(0, s) + before + sel + after + ta.value.slice(e);
    ta.focus();
    ta.setSelectionRange(s + before.length, e + before.length);
  }

  function viewNote(id) {
    viewingNoteId = id;
    const note = notes.find(n => n.id === id);
    document.getElementById('viewTitle').textContent = note.title || 'Sem título';
    document.getElementById('viewMeta').textContent = `${note.folder} · ${formatDate(note.updatedAt)}`;
    document.getElementById('viewBody').textContent = note.body;

    const area = document.getElementById('htmlPreviewArea');
    const isHTML = note.body.trim().startsWith('<') || /<\w+[\s>]/.test(note.body);
    if (isHTML) {
      area.innerHTML = `<div class="html-preview-wrap"><div class="html-preview-bar">PRÉVIA HTML</div></div>`;
      const iframe = document.createElement('iframe');
      iframe.className = 'html-preview-frame';
      area.querySelector('.html-preview-wrap').appendChild(iframe);
      iframe.srcdoc = note.body;
    } else {
      area.innerHTML = '';
    }
    showPage('view');
  }

  function editCurrentNote() { if (viewingNoteId) openEditor(viewingNoteId); }

  function deleteNote(id) {
    if (confirm('Excluir esta nota?')) {
      notes = notes.filter(n => n.id !== id);
      save();
      renderAll();
    }
  }

  function buildHTML(note) {
    return `<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>${note.title}</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 2rem; color: #1a1a1a; line-height: 1.75; }
  h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
  .meta { color: #999; font-size: 0.75rem; margin-bottom: 2rem; font-family: monospace; }
  p { margin-bottom: 1em; }
</style>
</head>
<body>
<h1>${note.title}</h1>
<div class="meta">${note.folder} · ${formatDate(note.updatedAt)}</div>
${/<\w+[\s>]/.test(note.body) ? note.body : '<p>' + note.body.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>') + '</p>'}
</body>
</html>`;
  }

  function exportHTML() {
    const title = document.getElementById('editorTitle').value.trim() || 'nota';
    const body = document.getElementById('editorBody').value;
    const folder = document.getElementById('editorFolder').value;
    download({ title, body, folder, updatedAt: Date.now() });
  }

  function exportHTMLFromView() {
    const note = notes.find(n => n.id === viewingNoteId);
    if (note) download(note);
  }

  function download(note) {
    const blob = new Blob([buildHTML(note)], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (note.title || 'nota').replace(/\s+/g,'_') + '.html';
    a.click();
  }

  function openNewFolderModal() {
    document.getElementById('newFolderInput').value = '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('newFolderInput').focus(), 80);
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

  function confirmNewFolder() {
    const name = document.getElementById('newFolderInput').value.trim();
    if (name && !folders.includes(name)) { folders.push(name); save(); renderAll(); }
    closeModal();
  }

  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  renderAll();
</script>
</body>
</html>
